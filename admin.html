<!DOCTYPE html>
<html>

<head>
    <title>Panel de Administrador</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="sylessheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <h1>Panel de Administrador</h1>

    <div class="buscador">

        <label><strong>Buscar turnos por fecha</strong></label>

        <input type="date" id="buscarFecha">

        <button id="btnBuscar">

            🔍 Buscar

        </button>

        <button id="btnHoy">

            📅 Hoy

        </button>

    </div>

    <div id="listaTurnos"></div>
    <div id="modalTurno" class="modal">

        <div class="modal-contenido">

            <h2 id="tituloModal">

                Turno

            </h2>

            <input id="modalNombre" type="text" placeholder="Nombre">

            <input id="modalTelefono" type="text" placeholder="Teléfono">

            <select id="modalServicio">

                <option value="18000">

                    Soft Gel

                </option>

                <option value="15000">

                    Capping

                </option>

                <option value="12000">

                    Semipermanente / Esmaltado

                </option>

            </select>

            <input id="modalPrecio" type="number">

            <input id="modalFecha" type="date">

            <select id="modalHora"></select>

            <select id="modalEstado">

                <option>Pendiente</option>

                <option>Confirmado</option>

                <option>Realizado</option>

                <option>Cancelado</option>

            </select>

            <div class="acciones-modal">

                <button id="btnGuardarModal">

                    Guardar

                </button>

                <button id="btnCancelarModal">

                    Cancelar

                </button>

            </div>

        </div>

    </div>
    <div class="card">

        <h2>⚙ Configuración de agenda</h2>

        <label>
            <input type="checkbox" id="lunes" value="1">
            Lunes
        </label>

        <label>
            <input type="checkbox" id="martes" value="2">
            Martes
        </label>

        <label>
            <input type="checkbox" id="miercoles" value="3">
            Miércoles
        </label>

        <label>
            <input type="checkbox" id="jueves" value="4">
            Jueves
        </label>

        <label>
            <input type="checkbox" id="viernes" value="5">
            Viernes
        </label>

        <label>
            <input type="checkbox" id="sabado" value="6">
            Sábado
        </label>

        <label>
            <input type="checkbox" id="domingo" value="0">
            Domingo
        </label>

        <button id="btnGuardarDias">

            Guardar días de trabajo

        </button>

    </div>
    <script type="module" src="js/admin.js"></script>
</body>

</html>
