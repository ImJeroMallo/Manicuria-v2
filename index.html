<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>muñaño</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <header class="hero">
                <h1>✨ Atenea Nails ✨</h1>
                <p>💅 Reservá tu turno 💅</p>
            </header>
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="telefono" placeholder="Teléfono de contacto">
            <select id="servicio"></select>
            <input type="date" id="fecha">
            <select id="hora">
                <option value="">
                    Seleccione un horario
                </option>
                <option>07:30hs</option>
                <option>09:30hs</option>
                <option>13:30hs</option>
                <option>15:30hs</option>
                <option>17:30hs</option>
            </select>
            <p id="estadoHorarios"></p>
            <button id="btnReservar" onclick="reservar()">
                Pagar seña y reservar
            </button>
            <p id="mensaje"></p>
            <button onclick="enviarWhatsApp()">
                Ya pagué la seña
            </button>
            <hr>
        </div>
    </div>
    <script type="module" src="js/index.js"></script>
</body>

</html>
